global_defs {
    router_id HAPROXY_0
}

vrrp_script chk_haproxy {
    script "/usr/bin/pgrep haproxy"
    interval 2
    fall 2
    rise 2
    weight -150
}

vrrp_instance VI_1 {

    state MASTER

    interface ens192 # перевірити назву інтерфейсу на сервері командою ip a  і замінити на свою назву

    virtual_router_id 51

    priority 200

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass tM5SBVIP1
    }

    virtual_ipaddress {
        10.10.10.154/24
    }

    track_script {
        chk_haproxy
    }
}
