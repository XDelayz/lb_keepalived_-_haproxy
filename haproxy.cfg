global
    log /dev/log local0
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/zoltraak.pp.ua.pem alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https
    default_backend podinfo_backend

backend podinfo_backend
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server podinfo0 10.10.10.20:80 check
    server podinfo1 10.10.10.21:80 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
